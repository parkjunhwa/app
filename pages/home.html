<div class="evs-screen evs-root home-screen">
  <header class="nav-header nav-header--home">
    <span class="nav-header__spacer" aria-hidden="true"></span>
    <div class="nav-title" aria-hidden="true"></div>
    <div class="nav-header__actions"></div>
  </header>
  <div class="evs-content">
    <div class="page-pad--20 home-hero">
      <p class="hero-greeting">안녕하세요, <em>김웅진</em>님</p>
      <p class="hero-sub">마케팅팀 · 마케팅 운영비 A1001</p>
    </div>
    <div class="chip-row">
      <span class="chip active" data-home-tab="all" role="button" tabindex="0">전체</span>
      <span class="chip" data-home-tab="need" role="button" tabindex="0">미처리</span>
      <span class="chip" data-home-tab="unsubmitted" role="button" tabindex="0">미제출</span>
      <span class="chip" data-home-tab="approve" role="button" tabindex="0">승인대기</span>
      <span class="chip" data-home-tab="month" role="button" tabindex="0">이번 달</span>
    </div>
    <div class="evs-card summary-card">
      <div class="summary-card__head">
        <span class="summary-card__label" id="homeSummaryLabel">이번 달 사용 금액 ›</span>
        <span class="summary-card__month" id="homeSummaryMonth">5월</span>
      </div>
      <div class="summary-card__amount" id="homeSummaryAmount">780,000<span class="summary-card__unit">원</span></div>
      <p class="summary-card__today" id="homeSummaryToday">오늘 125,000원 사용</p>
      <div class="summary-card__progress" aria-hidden="true">
        <div class="summary-card__progress-fill" id="homeSummaryProgress" style="width:62%"></div>
      </div>
      <div class="summary-card__budget">
        <span>예산 대비 <span id="homeSummaryProgressText">62</span>%</span>
        <strong id="homeSummaryBudget">1,250,000원</strong>
      </div>
    </div>
    <div class="quick-grid">
      <div class="quick-card quick-card--sky" data-nav="#/expense/inbox?mode=need">
        <span class="quick-card__icon" data-lucide="credit-card" data-lucide-size="20"></span>
        <span class="quick-card__label">미처리 카드내역</span>
        <span class="quick-card__count" id="homeCountNeed">3건</span>
      </div>
      <div class="quick-card quick-card--mint">
        <span class="quick-card__icon" data-lucide="file-text" data-lucide-size="20"></span>
        <span class="quick-card__label">미제출 경비</span>
        <span class="quick-card__count" id="homeCountUnsubmitted">2건</span>
      </div>
      <div class="quick-card quick-card--lilac" data-nav="#/approve">
        <span class="quick-card__icon" data-lucide="bell" data-lucide-size="20"></span>
        <span class="quick-card__label">승인 대기</span>
        <span class="quick-card__count" id="homeCountApprove">1건</span>
      </div>
    </div>
    <div class="page-pad home-recent">
      <div class="home-recent__head">
        <span class="home-recent__title">최근 내역</span>
        <span class="home-recent__link" data-nav="#/expense/inbox?mode=all" role="link" tabindex="0">전체보기 ›</span>
      </div>
      <div class="evs-card receipt-list" id="homeRecentList"></div>
      <div class="home-register-banner" data-nav="#/expense/receipt" role="button" tabindex="0">
        <p class="home-register-banner__title">
          경비등록
          <span class="home-register-banner__chevron" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </p>
        <p class="home-register-banner__sub">직접 경비를 등록하세요.</p>
      </div>
    </div>
  </div>
</div>
