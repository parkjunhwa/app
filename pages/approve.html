<div class="evs-screen evs-root approve-queue-screen">
  <header class="nav-header">
    <button type="button" class="nav-back" data-back aria-label="뒤로"><span data-lucide-back></span></button>
    <div class="nav-title">승인 대기</div>
    <div class="nav-header__actions"></div>
  </header>
  <div class="inbox-tabbar">
    <div class="inbox-tabbar__main">
      <div class="evs-tabs inbox-tabs">
        <button type="button" class="evs-tab active" data-tab="all">전체 <span class="count"></span></button>
        <button type="button" class="evs-tab" data-tab="urgent">긴급 <span class="count"></span></button>
        <button type="button" class="evs-tab" data-tab="rejected">반려 <span class="count"></span></button>
      </div>
      <button type="button" class="inbox-filter-button" aria-expanded="false" aria-label="필터"><span data-lucide-filter></span> 필터</button>
    </div>
    <div class="inbox-filter-bar" id="approveFilterPanel" hidden aria-label="목록 필터">
      <div class="inbox-filter-bar__fields">
        <label class="inbox-filter-field">
          <span class="inbox-filter-field__label">기간</span>
          <select class="inbox-filter-select" data-filter="period" aria-label="기간"></select>
        </label>
        <label class="inbox-filter-field">
          <span class="inbox-filter-field__label">카드</span>
          <select class="inbox-filter-select" data-filter="card" aria-label="카드">
            <option value="all">전체</option>
            <option value="corp">법인</option>
            <option value="personal">개인</option>
          </select>
        </label>
        <label class="inbox-filter-field">
          <span class="inbox-filter-field__label">업종</span>
          <select class="inbox-filter-select" data-filter="industry" aria-label="업종"></select>
        </label>
      </div>
      <button type="button" class="inbox-filter-bar__reset" disabled>초기화</button>
    </div>
  </div>
  <div class="evs-content" style="padding:12px 16px;">
    <div id="approveQueueList"></div>
  </div>
</div>
